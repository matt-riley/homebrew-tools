name: Trigger mattriley.tools sync

on:
  push:
    branches:
      - main
    paths:
      - Formula/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trigger-mattriley-tools-sync
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch sync workflow in mattriley.tools
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.MATTRILEY_TOOLS_WORKFLOW_DISPATCH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'matt-riley',
              repo: 'mattriley.tools',
              workflow_id: 'sync-tools-data.yml',
              ref: 'main',
              inputs: {
                tap_sha: context.sha,
                tap_ref: context.ref.replace('refs/heads/', ''),
              },
            });
